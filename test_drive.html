    </header>    <main>
        <div class="form-container">
            <h3>Test Drive</h3>
            <form id="testDriveForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name">
                <div class="error" id="nameError"></div>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone">
                <div class="error" id="phoneError"></div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email">
                <div class="error" id="emailError"></div>
            </div>
            <div class="form-group">
                <label for="car">Brand</label>
                <select id="car">
                    <option value="">Select Brand</option>
                    <option value="audi">Audi</option>
                    <option value="tesla">Tesla</option>
                    <option value="mercedes">Mercedes-Benz</option>
                    <option value="porsche">Porsche</option>
                    <option value="lamborghini">Lamborghini</option>
                    <option value="ferrari">Ferrari</option>
                    <option value="toyota">Toyota</option>
                    <option value="ford">Ford</option>
                    <option value="chevrolet">Chevrolet</option>
                </select>
                <div class="error" id="carError"></div>
            </div>
            <div class="form-group">
                <label for="model">Model</label>
                <select id="model" disabled>
                    <option value="">Select Model</option>
                </select>
                <div class="error" id="modelError"></div>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date">
                <div class="error" id="dateError"></div>
            </div>
            <button type="submit">Submit</button>
            <div class="success" id="successMsg"></div>
            </form>        
        </div>

    <script>
        const carData = {
        "audi": ["Audi A6", "Audi Q5", "Audi A8"],
        "tesla": ["Tesla Model S", "Tesla Model 3", "Tesla Model X"],
        "mercedes": ["Mercedes-Benz S-Class", "Mercedes-Benz E-Class", "Mercedes-Benz GLE"],
        "porsche": ["Porsche 911", "Porsche Cayenne", "Porsche Taycan"],
        "lamborghini": ["Lamborghini Huracan"],
        "ferrari": ["Ferrari F8 Tributo"],
        "toyota": ["Toyota Land Cruiser", "Toyota Corolla"],
        "ford": ["Ford Mustang GT"],
        "chevrolet": ["Chevrolet Camaro"]
        };

        const carSelect = document.getElementById("car");
        const modelSelect = document.getElementById("model");
        const userLogged=localStorage.getItem("loggedInUser")
        carSelect.addEventListener("change", function() {
        const selectedBrand = this.value;
        modelSelect.innerHTML = '<option value="">Select Model</option>';
        
        if (selectedBrand && carData[selectedBrand]) {
            modelSelect.disabled = false;
            carData[selectedBrand].forEach(m => {
            let opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m;
            modelSelect.appendChild(opt);
            });
        } else {
            modelSelect.disabled = true;
        }
        });

        document.getElementById("testDriveForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        let name = document.getElementById("name").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let email = document.getElementById("email").value.trim();
        let car = carSelect.value;
        let model = modelSelect.value;
        let date = document.getElementById("date").value;

        document.querySelectorAll(".error").forEach(el => el.innerText = "");
        document.getElementById("successMsg").innerText = "";

        let valid = true;
        if (name.length < 3) { document.getElementById("nameError").innerText = "Name is too short"; valid = false; }
        if (!/^01[0-9]{9}$/.test(phone)) { document.getElementById("phoneError").innerText = "Invalid phone"; valid = false; }
        if (!email.includes("@")) { document.getElementById("emailError").innerText = "Invalid email"; valid = false; }
        if (!car) { document.getElementById("carError").innerText = "Select brand"; valid = false; }
        if (!model) { document.getElementById("modelError").innerText = "Select model"; valid = false; }
        const selectedDate = new Date(date);
        const today = new Date();
        today.setHours(0, 0, 0, 0); 

        if (!date || selectedDate < today) {
            document.getElementById("dateError").innerText = "Please select a valid future date";
            valid = false;
        }
        if (valid) {
            let booking = { userLogged ,name, phone, email, car, model, date };
            let bookings = JSON.parse(localStorage.getItem("testDrive")) || [];
            bookings.push(booking);
            localStorage.setItem("testDrive", JSON.stringify(bookings));

            document.getElementById("successMsg").innerText = "Booking Successful !";
            this.reset();
            modelSelect.disabled = true;
        }
        });
    </script>
    <script src="theme.js"></script>
